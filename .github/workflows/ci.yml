# Triggers on push to master branch or any pull request to master
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# The actual steps that run
jobs:
  build-and-test:           # This job runs tests and builds Docker image
    runs-on: ubuntu-latest  # Uses Ubuntu as the runner

    steps:
    # Step 1: Checks out your code
    - uses: actions/checkout@v3

    # Step 2: Sets up Node.js with npm caching for faster builds
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    # Step 3: Installs dependencies (npm ci is faster than npm install)
    - name: Install dependencies
      run: npm ci
    
    # Step 4: Runs tests
    - name: Run tests
      run: npm test

    # Step 5: Builds and pushes Docker image (only on main branch)
    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
        docker build -t ${{ secrets.DOCKER_USERNAME }}/nest-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/nest-app:latest